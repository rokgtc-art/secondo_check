<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀이야 부티크 | Bimirya Boutique</title>
    <meta
      name="description"
      content="비밀이야 부티크 대시보드 - 정적 웹사이트 기반 다크 모드 대시보드"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Bimirya Boutique Dashboard</p>
          <h1>비밀이야 부티크 대시보드</h1>
        </div>

        <div class="status-card summary-card">
          <p class="status-label">Daily Revenue</p>
          <span id="dailySalesDate">-</span>
          <strong id="dailySales">0원</strong>
        </div>
      </header>

      <section class="info-row">
        <div class="status-card">
          <p class="status-label">Today</p>
          <strong id="currentDate">-</strong>
          <span id="currentTime">-</span>
        </div>

        <div class="status-card status-card-accent">
          <p class="status-label">Working On</p>
          <strong><span id="staffCount">12</span> 명</strong>
        </div>
      </section>

      <main class="dashboard">
        <div class="section-head">
          <div>
            <p class="eyebrow">Overview</p>
            <h2>품목별 출고</h2>
          </div>
          <p class="section-note">현재는 임시 데이터로 구성되어 있습니다.</p>
        </div>

        <section id="dashboardGrid" class="dashboard-grid" aria-live="polite"></section>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="dashboard-card">
        <div class="card-top">
          <h3 class="card-title"></h3>
          <span class="card-chip"></span>
        </div>
        <p class="card-label"></p>
        <p class="card-metric"></p>
        <p class="card-note"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
